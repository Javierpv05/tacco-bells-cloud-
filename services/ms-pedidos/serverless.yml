org: javierpariansullca
service: ms-pedidos

frameworkVersion: "4"

provider:
  name: aws
  runtime: python3.12
  region: us-east-1
  iam:
    role: arn:aws:iam::${aws:accountId}:role/LabRole
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:PutItem
        - dynamodb:GetItem
        - dynamodb:Query
        - dynamodb:UpdateItem
      Resource:
        - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/pedidos-${sls:stage}
        - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/pedidos-${sls:stage}/index/PorEstado
    - Effect: Allow
      Action:
        - events:PutEvents
      Resource:
        - !Sub arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/pedidos-bus-${sls:stage}
  apiGateway:
    apiKeys:
      - name: rappi-key-${sls:stage}
        value: ${env:RAPPI_API_KEY}
    usagePlan:
      quota:
        limit: 5000
        period: MONTH
      throttle:
        burstLimit: 20
        rateLimit: 10

functions:
  crearPedido:
    handler: handlers/crear_pedido.handler
    environment:
      TABLE_NAME: pedidos-${sls:stage}
      EVENT_BUS_NAME: pedidos-bus-${sls:stage}
    events:
      - http:
          path: pedidos
          method: post
          cors: true

  # ── Canal protegido para integraciones externas (Rappi/OCI) ─────────────
  crearPedidoExterno:
    handler: handlers/crear_pedido_externo.handler
    environment:
      TABLE_NAME: pedidos-${sls:stage}
      EVENT_BUS_NAME: pedidos-bus-${sls:stage}
    events:
      - http:
          path: pedidos/externos
          method: post
          cors: true
          private: true

  consultarEstado:
    handler: handlers/consultar_estado.handler
    environment:
      TABLE_NAME: pedidos-${sls:stage}
    events:
      - http:
          path: pedidos/{pedido_id}
          method: get
          cors: true

  listarPedidos:
    handler: handlers/listar_pedidos.handler
    environment:
      TABLE_NAME: pedidos-${sls:stage}
    events:
      - http:
          path: pedidos
          method: get
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref ApiGatewayAuthorizer

  listarPorEstado:
    handler: handlers/listar_por_estado.handler
    environment:
      TABLE_NAME: pedidos-${sls:stage}
    events:
      - http:
          path: pedidos/estado/{estado}
          method: get
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref ApiGatewayAuthorizer

resources:
  Resources:
    # ── Authorizer referenciando el User Pool de ms-auth ──────────────────
    ApiGatewayAuthorizer:
      Type: AWS::ApiGateway::Authorizer
      Properties:
        Name: CognitoAuthorizer-pedidos-${sls:stage}
        Type: COGNITO_USER_POOLS
        IdentitySource: method.request.header.Authorization
        RestApiId: !Ref ApiGatewayRestApi
        ProviderARNs:
          # Cross-stack reference: ms-auth debe estar desplegado primero
          - ${cf:ms-auth-${sls:stage}.UserPoolArn}

    # ── CORS en respuestas nativas de error (401/403 del Authorizer) ───────
    GatewayResponseDefault4XX:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'*'"
        ResponseType: DEFAULT_4XX
        RestApiId: !Ref ApiGatewayRestApi

    # ── Tabla DynamoDB ────────────────────────────────────────────────────
    TablaPedidos:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: pedidos-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: tenant_id
            AttributeType: S
          - AttributeName: pedido_id
            AttributeType: S
          - AttributeName: tenant_estado
            AttributeType: S
          - AttributeName: fecha_creacion
            AttributeType: S
        KeySchema:
          - AttributeName: tenant_id
            KeyType: HASH
          - AttributeName: pedido_id
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: PorEstado
            KeySchema:
              - AttributeName: tenant_estado
                KeyType: HASH
              - AttributeName: fecha_creacion
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    # ── EventBridge Bus ───────────────────────────────────────────────────
    PedidosEventBus:
      Type: AWS::Events::EventBus
      Properties:
        Name: pedidos-bus-${sls:stage}
