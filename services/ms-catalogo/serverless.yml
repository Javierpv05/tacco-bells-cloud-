org: javierpariansullca
service: ms-catalogo

frameworkVersion: "4"

provider:
  name: aws
  runtime: python3.12
  region: us-east-1
  iam:
    role: arn:aws:iam::413507650058:role/LabRole
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:PutItem
        - dynamodb:GetItem
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
        - dynamodb:Query
      Resource:
        - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/productos-${sls:stage}

functions:
  listarProductos:
    handler: handlers/listar_productos.handler
    environment:
      TABLE_NAME: productos-${sls:stage}
    events:
      - http:
          path: productos
          method: get
          cors: true

  crearProducto:
    handler: handlers/crear_producto.handler
    environment:
      TABLE_NAME: productos-${sls:stage}
    events:
      - http:
          path: productos
          method: post
          cors: true

  buscarProducto:
    handler: handlers/buscar_producto.handler
    environment:
      TABLE_NAME: productos-${sls:stage}
    events:
      - http:
          path: productos/{producto_id}
          method: get
          cors: true

  modificarProducto:
    handler: handlers/modificar_producto.handler
    environment:
      TABLE_NAME: productos-${sls:stage}
    events:
      - http:
          path: productos/{producto_id}
          method: put
          cors: true

  eliminarProducto:
    handler: handlers/eliminar_producto.handler
    environment:
      TABLE_NAME: productos-${sls:stage}
    events:
      - http:
          path: productos/{producto_id}
          method: delete
          cors: true

resources:
  Resources:
    TablaProductos:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: productos-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: tenant_id
            AttributeType: S
          - AttributeName: producto_id
            AttributeType: S
        KeySchema:
          - AttributeName: tenant_id
            KeyType: HASH
          - AttributeName: producto_id
            KeyType: RANGE
