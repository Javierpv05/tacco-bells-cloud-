org: javierpariansullca
service: ms-catalogo

frameworkVersion: "4"

provider:
  name: aws
  runtime: python3.12
  region: us-east-1
  iam:
    role: arn:aws:iam::${aws:accountId}:role/LabRole
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:PutItem
        - dynamodb:GetItem
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
        - dynamodb:Query
      Resource:
        - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/productos-${sls:stage}
    - Effect: Allow
      Action:
        - s3:PutObject
      Resource:
        - !Sub arn:aws:s3:::popeyes-images-${sls:stage}-${AWS::AccountId}/*

functions:
  listarProductos:
    handler: handlers/listar_productos.handler
    environment:
      TABLE_NAME: productos-${sls:stage}
    events:
      - http:
          path: productos
          method: get
          cors: true

  crearProducto:
    handler: handlers/crear_producto.handler
    environment:
      TABLE_NAME: productos-${sls:stage}
    events:
      - http:
          path: productos
          method: post
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref ApiGatewayAuthorizer

  buscarProducto:
    handler: handlers/buscar_producto.handler
    environment:
      TABLE_NAME: productos-${sls:stage}
    events:
      - http:
          path: productos/{producto_id}
          method: get
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref ApiGatewayAuthorizer

  modificarProducto:
    handler: handlers/modificar_producto.handler
    environment:
      TABLE_NAME: productos-${sls:stage}
    events:
      - http:
          path: productos/{producto_id}
          method: put
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref ApiGatewayAuthorizer

  eliminarProducto:
    handler: handlers/eliminar_producto.handler
    environment:
      TABLE_NAME: productos-${sls:stage}
    events:
      - http:
          path: productos/{producto_id}
          method: delete
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref ApiGatewayAuthorizer

  # ── Genera una URL prefirmada de S3 para subir la imagen de un producto ──
  generarUrlSubidaImagen:
    handler: handlers/generar_url_subida.handler
    environment:
      BUCKET_NAME: !Sub popeyes-images-${sls:stage}-${AWS::AccountId}
    events:
      - http:
          path: productos/upload-url
          method: post
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref ApiGatewayAuthorizer

resources:
  Resources:
    # ── Authorizer referenciando el User Pool de ms-auth ──────────────────
    ApiGatewayAuthorizer:
      Type: AWS::ApiGateway::Authorizer
      Properties:
        Name: CognitoAuthorizer-catalogo-${sls:stage}
        Type: COGNITO_USER_POOLS
        IdentitySource: method.request.header.Authorization
        RestApiId: !Ref ApiGatewayRestApi
        ProviderARNs:
          # Cross-stack reference: ms-auth debe estar desplegado primero
          - ${cf:ms-auth-${sls:stage}.UserPoolArn}

    # ── CORS en respuestas nativas de error (401/403 del Authorizer) ───────
    GatewayResponseDefault4XX:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'*'"
        ResponseType: DEFAULT_4XX
        RestApiId: !Ref ApiGatewayRestApi

    # ── Tabla DynamoDB ────────────────────────────────────────────────────
    TablaProductos:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: productos-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: tenant_id
            AttributeType: S
          - AttributeName: producto_id
            AttributeType: S
        KeySchema:
          - AttributeName: tenant_id
            KeyType: HASH
          - AttributeName: producto_id
            KeyType: RANGE

    # ── Bucket S3 para imagenes de productos ───────────────────────────────
    BucketImagenes:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: !Sub popeyes-images-${sls:stage}-${AWS::AccountId}
        CorsConfiguration:
          CorsRules:
            - AllowedMethods: [GET, PUT]
              AllowedOrigins: ["*"]
              AllowedHeaders: ["*"]
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          IgnorePublicAcls: true
          BlockPublicPolicy: false
          RestrictPublicBuckets: false

    PoliticaBucketImagenes:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref BucketImagenes
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal: "*"
              Action: s3:GetObject
              Resource: !Sub arn:aws:s3:::popeyes-images-${sls:stage}-${AWS::AccountId}/*
