# Representación YAML de la configuración del API Gateway.
# El script deploy.sh usa una versión JSON de esta configuración para interactuar con OCI CLI.
routes:
  - path: "/pedidos"
    methods: 
      - "POST"
    backend:
      type: "HTTP_BACKEND"
      url: "https://xoogztranc.execute-api.us-east-1.amazonaws.com/dev/pedidos/externos"
    requestPolicies:
      headerTransformations:
        setHeaders:
          items:
            - name: "x-api-key"
              # Valor real inyectado por deploy.sh desde $RAPPI_API_KEY (.env
              # en la raiz del repo). Nunca hardcodear el valor real aqui.
              values:
                - "${RAPPI_API_KEY}"
              ifExists: "OVERWRITE"
  - path: "/estado"
    methods: 
      - "POST"
    backend:
      type: "ORACLE_FUNCTIONS_BACKEND"
      # Este OCID es reemplazado dinámicamente en el script deploy.sh en la especificación JSON
      functionId: "${FUNCTION_OCID}"
